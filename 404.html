<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Хуудас олдсонгүй | LFS Shanghai</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="robots" content="noindex, nofollow">
<script>
  // /health → /health/ гэх мэт trailing slash дутуу байвал redirect
  var path = window.location.pathname;
  var pages = ['/health','/routes','/tips','/metro','/contact','/booking','/planner','/login','/profile','/pricing','/blog','/terms','/privacy','/admin','/pdf'];
  for (var i = 0; i < pages.length; i++) {
    if (path === pages[i] || path.indexOf(pages[i] + '/') === 0) {
      window.location.replace(path.replace(/\/?$/, '/') + window.location.search + window.location.hash);
      break;
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;
  --bg2:#f5f5f7;
  --text:#1d1d1f;
  --muted:#6e6e73;
  --blue:#0071e3;
  --blue-hover:#0077ed;
  --border:rgba(0,0,0,.08);
  --shadow:0 2px 20px rgba(0,0,0,.08);
  --radius:18px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-size:16px;font-weight:800;
  letter-spacing:-.03em;
  color:var(--text);
  text-decoration:none;
}
.nav-logo span{color:var(--blue)}
.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;
  background:var(--bg2);
  color:var(--text);
  border:none;border-radius:980px;
  font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:none;
  transition:background .15s;
}
.btn-back:hover{background:#e8e8ed}

/* MAIN */
.page{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:80px 24px 48px;
  background:var(--bg2);
}
.card{
  background:var(--bg);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:56px 48px;
  text-align:center;
  max-width:480px;
  width:100%;
}
.num{
  font-size:96px;font-weight:900;
  color:var(--blue);
  letter-spacing:-.05em;
  line-height:1;
  margin-bottom:16px;
}
.title{
  font-size:24px;font-weight:700;
  letter-spacing:-.02em;
  color:var(--text);
  margin-bottom:10px;
}
.sub{
  font-size:15px;
  color:var(--muted);
  line-height:1.6;
  margin-bottom:32px;
}
.btn-home{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;
  background:var(--blue);
  color:#fff;
  border:none;border-radius:980px;
  font-family:inherit;font-size:15px;font-weight:600;
  cursor:pointer;text-decoration:none;
  transition:background .15s,transform .1s;
}
.btn-home:hover{background:var(--blue-hover)}
.btn-home:active{transform:scale(.97)}

@media(max-width:480px){
  .card{padding:40px 24px}
  .num{font-size:72px}
  .title{font-size:20px}
}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-logo">LFS <span>Shanghai</span></a>
  <a href="/" class="btn-back">← Буцах</a>
</nav>

<main class="page">
  <div class="card">
    <div class="num">404</div>
    <h1 class="title">Хуудас олдсонгүй</h1>
    <p class="sub">Та хайж буй хуудас байхгүй байна.</p>
    <a href="/" class="btn-home">← Нүүр хуудас руу буцах</a>
  </div>
</main>

</body>
</html>
