<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Jarvis">
  <meta name="theme-color" content="#0a0a0a">
  <title>Jarvis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div>
      <h1>Сайн уу, Билэг</h1>
      <div class="sub" id="date-txt"></div>
      <div class="score-chip" id="score-chip"></div>
    </div>
    <div class="avatar" id="avatar-btn" onclick="toggleAccountMenu()">Б</div>
  </header>

  <!-- ACCOUNT MENU -->
  <div id="account-menu" class="account-menu" style="display:none">
    <div id="account-info" class="account-info">Уншиж байна...</div>
    <button onclick="if(confirm('Гарах уу?')){window.signOut?.();document.getElementById('account-menu').style.display='none'}">🚪 Гарах</button>
  </div>

  <!-- JARVIS PANEL -->
  <div class="jarvis-panel">
    <div class="jarvis-head">
      <div class="j-dot"></div>
      <span class="j-label">JARVIS</span>
      <button class="j-refresh" onclick="refreshJarvis()" title="Шинэчлэх">↻</button>
    </div>
    <div class="j-msg" id="j-msg"></div>
  </div>

  <!-- ROUTINE -->
  <div class="sec-label">Өдрийн routine</div>
  <div class="routine-scroll">

    <!-- Water -->
    <div class="r-item" id="ri-water">
      <div class="r-circle">
        <span class="r-icon">💧</span>
        <span class="r-num" id="w-num">0</span>
        <div class="r-check">✓</div>
      </div>
      <div class="w-controls">
        <button class="w-btn" onclick="changeWater(-1)">−</button>
        <span class="w-val">/8</span>
        <button class="w-btn" onclick="changeWater(1)">+</button>
      </div>
      <span class="r-label">Ус</span>
    </div>

    <!-- Exercise -->
    <div class="r-item" id="ri-exercise" onclick="toggleR('exercise')">
      <div class="r-circle">
        <span class="r-icon">🏃</span>
        <div class="r-check">✓</div>
      </div>
      <span class="r-label">Дасгал</span>
    </div>

    <!-- Hanzi -->
    <div class="r-item" id="ri-hanzi" onclick="toggleR('hanzi')">
      <div class="r-circle">
        <span class="r-icon" style="font-size:22px;font-family:serif">汉</span>
        <div class="r-check">✓</div>
      </div>
      <span class="r-label">汉字</span>
    </div>

    <!-- Read -->
    <div class="r-item" id="ri-read" onclick="toggleR('read')">
      <div class="r-circle">
        <span class="r-icon">📖</span>
        <div class="r-check">✓</div>
      </div>
      <span class="r-label">Унших</span>
    </div>

    <!-- Journal -->
    <div class="r-item" id="ri-journal" onclick="toggleR('journal')">
      <div class="r-circle">
        <span class="r-icon">🌙</span>
        <div class="r-check">✓</div>
      </div>
      <span class="r-label">Journal</span>
    </div>

  </div>

  <!-- MISSIONS -->
  <div class="sec-label" style="margin-top:4px">Миссион</div>
  <div class="mission-section" id="mission-section"></div>

  <!-- FEED -->
  <div class="sec-label" style="margin-top:8px">Өнөөдөр</div>
  <div class="feed" id="feed"></div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="/jarvis/index.html">   <span class="ni">🏠</span><span>Нүүр</span></a>
    <a class="nav-item"        href="/jarvis/life.html">     <span class="ni">📋</span><span>Life OS</span></a>
    <a class="nav-item"        href="/jarvis/dashboard.html"><span class="ni">📈</span><span>Статс</span></a>
    <a class="nav-item"        href="/jarvis/chat.html">     <span class="ni">🤖</span><span>Chat</span></a>
    <a class="nav-item"        href="/jarvis/profile.html"><span class="ni">👤</span><span>Профайл</span></a>
  </nav>

  <div id="sync-bar" class="sync-bar" style="display:none"></div>
  <div id="toast"></div>

  <!-- Sprint 7: Red Alert Overlay (index.html дээр ч харагдана) -->
  <div id="jarvis-red-alert" style="
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(220,38,38,0.1); backdrop-filter:blur(4px);
    border:2px solid rgba(220,38,38,0.5);
    animation:jarvis-alert-pulse 1.2s ease-in-out infinite;
    align-items:center; justify-content:center;
  ">
    <div style="
      background:#1a0505; border:1.5px solid rgba(220,38,38,0.8); border-radius:16px;
      padding:24px 28px; text-align:center; max-width:300px; width:90%;
      box-shadow:0 0 40px rgba(220,38,38,0.3);
    ">
      <h2 style="color:#ef4444;font-size:15px;margin:0 0 6px">⚠️ Human Agent Needed!</h2>
      <p id="idx-alert-sender" style="font-size:12px;color:rgba(252,165,165,0.8);margin:0 0 4px"></p>
      <p id="idx-alert-msg"    style="font-size:12px;color:rgba(255,255,255,0.55);margin:0 0 14px;line-height:1.5"></p>
      <button onclick="idxResolveAlert()" style="
        padding:9px 24px; background:#dc2626; border:none; border-radius:10px;
        color:white; font-size:13px; font-weight:600; cursor:pointer;
      ">✓ Шийдвэрлэлээ</button>
    </div>
  </div>
  <style>
    @keyframes jarvis-alert-pulse {
      0%,100% { border-color: rgba(220,38,38,0.5); }
      50%      { border-color: rgba(252,165,165,0.8); }
    }
    #jarvis-red-alert.active { display:flex !important; }
  </style>

  <script src="app.js"></script>
  <script src="gemini.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    // ── ACCOUNT MENU ─────────────────────────────────────────────
    function toggleAccountMenu() {
      const menu = document.getElementById('account-menu');
      const open = menu.style.display === 'none';
      menu.style.display = open ? 'block' : 'none';
      if (open) {
        const user = firebase.auth().currentUser;
        const info = document.getElementById('account-info');
        if (user?.email) info.textContent = '✉️ ' + user.email;
        else if (user?.isAnonymous) info.textContent = '👤 Anonymous (нэвтрээгүй)';
        else info.textContent = '—';
      }
    }
    document.addEventListener('click', e => {
      const menu = document.getElementById('account-menu');
      if (menu && !menu.contains(e.target) && e.target.id !== 'avatar-btn') {
        menu.style.display = 'none';
      }
    });

    // ── Sprint 7: Red Alert listener ─────────────────────────────
    _auth.onAuthStateChanged(function(user) {
      if (!user) return;
      _db.doc('users/' + user.uid + '/alerts/current')
        .onSnapshot(function(snap) {
          if (!snap.exists) return;
          var a = snap.data();
          if (a.resolved) {
            document.getElementById('jarvis-red-alert').classList.remove('active');
            return;
          }
          var sel = document.getElementById('idx-alert-sender');
          var mel = document.getElementById('idx-alert-msg');
          if (sel) sel.textContent = 'Хэрэглэгч: ' + (a.displayName || a.senderId || '—');
          if (mel) mel.textContent = '"' + (a.message || '').slice(0, 120) + '"';
          document.getElementById('jarvis-red-alert').classList.add('active');
        });
    });

    window.idxResolveAlert = function() {
      document.getElementById('jarvis-red-alert').classList.remove('active');
      var user = _auth.currentUser;
      if (user) {
        _db.doc('users/' + user.uid + '/alerts/current')
          .set({ resolved: true }, { merge: true }).catch(function(){});
      }
    };
  </script>
</body>
</html>
