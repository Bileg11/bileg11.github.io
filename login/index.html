<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f5f5f7;--card:#fff;
  --text:#1d1d1f;--muted:#6e6e73;--muted2:#86868b;
  --blue:#0071e3;--blue-hover:#0077ed;
  --border:rgba(0,0,0,.08);
  --shadow:0 2px 20px rgba(0,0,0,.08);--shadow2:0 8px 40px rgba(0,0,0,.12);
  --radius:18px;--dark:#000;--dark2:#1d1d1f;
}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:var(--bg2);color:var(--text);
  -webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;min-height:100vh;
}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:500;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 22px;
  background:rgba(255,255,255,.85);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid rgba(0,0,0,.06);
}
.nav-logo{font-size:17px;font-weight:700;color:var(--dark2);letter-spacing:-.02em;text-decoration:none}
.nav-logo span{color:var(--blue)}
.nav-back{
  padding:7px 16px;background:var(--bg2);color:var(--dark2);
  border:none;border-radius:20px;font-size:12px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:background .2s;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;
}
.nav-back:hover{background:var(--border)}

/* PAGE */
.page{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:80px 16px 40px;
}

/* CARD */
.card{
  background:var(--card);border-radius:24px;
  padding:40px 36px;width:100%;max-width:400px;
  box-shadow:var(--shadow2);
}
@media(max-width:480px){.card{padding:32px 24px;border-radius:20px}}

.card-logo{text-align:center;margin-bottom:28px}
.card-logo-text{font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--dark2)}
.card-logo-text span{color:var(--blue)}
.card-eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);text-align:center;margin-bottom:8px}
.card-title{font-size:24px;font-weight:700;letter-spacing:-.03em;color:var(--dark2);text-align:center;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;line-height:1.5}

/* SOCIAL BUTTONS */
.social-btn{
  width:100%;padding:12px 16px;border-radius:12px;
  font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:.15s;margin-bottom:10px;border:none;
}
.google-btn{background:#fff;color:#3c4043;border:1px solid #dadce0}
.google-btn:hover{background:#f8f9fa;border-color:#c6c9cb}
.fb-btn{background:#1877f2;color:#fff}
.fb-btn:hover{background:#166fe5}

/* DIVIDER */
.divider{
  text-align:center;font-size:12px;color:var(--muted);margin:18px 0;
  position:relative;
}
.divider::before,.divider::after{
  content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border);
}
.divider::before{left:0}.divider::after{right:0}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{
  flex:1;padding:10px;background:none;border:none;
  font-size:14px;font-weight:500;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:.15s;font-family:inherit;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input{
  width:100%;padding:11px 14px;border:1px solid var(--border);
  border-radius:10px;font-size:14px;font-family:inherit;
  color:var(--dark2);background:var(--bg);transition:.15s;outline:none;
}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.08)}
.submit-btn{
  width:100%;padding:13px;background:var(--blue);color:#fff;
  border:none;border-radius:12px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;margin-top:8px;transition:.2s;
}
.submit-btn:hover{background:var(--blue-hover)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}

/* MSG */
.msg{font-size:12px;padding:10px 14px;border-radius:8px;margin-top:12px;display:none;line-height:1.5}
.msg.error{background:#fff0f0;color:#c0392b;border:1px solid #fcc}
.msg.success{background:#f0fff4;color:#27ae60;border:1px solid #b2f0c8}

/* FOOTER */
.page-footer{text-align:center;padding:20px;font-size:12px;color:var(--muted)}

/* LOADING OVERLAY */
#loader{
  position:fixed;inset:0;z-index:9999;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s ease;
}
#loader.hidden{opacity:0;pointer-events:none}
.loader-logo{font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--dark2);margin-bottom:28px}
.loader-logo span{color:var(--blue)}
.loader-track{width:100px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.loader-fill{height:100%;width:0;background:var(--blue);border-radius:2px;animation:loaderFill .8s ease forwards}
@keyframes loaderFill{to{width:100%}}

/* PASSWORD SHOW/HIDE */
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.pass-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;
}
.pass-toggle:hover{color:var(--dark2)}
</style>
</head>
<body>

    <button class="social-btn google-btn" id="btnGoogle">

    <div class="tabs" id="tabsRow">

          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Буцах

    <div id="paneReg" style="display:none">

      </div>
      <div class="field">

          <input type="email" id="reg-email" placeholder="example@gmail.com" autocomplete="email" style="flex:1;min-width:0">
          <button type="button" id="btnSendCode" style="flex-shrink:0;padding:11px 14px;background:#f5f5f7;border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--dark2);white-space:nowrap;transition:.15s">Код авах</button>

        <label>Нууц үг</label>

<div class="page-footer">© 2025 LFS Shanghai</div>

<script>
function switchPane(t) {
  document.getElementById('paneLogin').style.display   = t==='login'    ? 'block' : 'none';
  document.getElementById('paneReg').style.display     = t==='register' ? 'block' : 'none';
  document.getElementById('paneForgot').style.display  = t==='forgot'   ? 'block' : 'none';
  document.getElementById('tabsRow').style.display     = t==='forgot'   ? 'none'  : 'flex';
  if (t !== 'forgot') {
    document.getElementById('tabLogin').classList.toggle('active', t==='login');
    document.getElementById('tabReg').classList.toggle('active', t==='register');
  }
}
function switchTab(t) { switchPane(t); }
const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeOff  = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
function togglePass(id, btn) {
  const el = document.getElementById(id);
  if (el.type === 'password') { el.type = 'text'; btn.innerHTML = eyeOff; }
  else { el.type = 'password'; btn.innerHTML = eyeOpen; }
}
// Set back button href to redirect target or home
(function(){
  const p = new URLSearchParams(location.search).get('redirect');
  if (p) document.getElementById('backBtn').href = p;
})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-analytics.js";
import {
  getAuth, onAuthStateChanged, signOut,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDixZdKwlrixRFokERCMQ5Ld1BMkhUttCQ",
  authDomain: "lfs-shanghai.firebaseapp.com",
  projectId: "lfs-shanghai",
  storageBucket: "lfs-shanghai.firebasestorage.app",
  messagingSenderId: "337508244675",
  appId: "1:337508244675:web:f47b7e14417a0f1d129676",
  measurementId: "G-81DTJ80VLR"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const analytics = getAnalytics(app);
logEvent(analytics, 'page_view', { page_title: 'Login Page' });

// Redirect target (from ?redirect=/booking etc.)
const redirectTo = new URLSearchParams(location.search).get('redirect') || '/profile/';

onAuthStateChanged(auth, async user => {
  if (user) {
    try { await ensureProfile(user); } catch(e) { console.warn('profile:', e); }
    window.location.replace(redirectTo);
  } else {
    document.getElementById('loader').classList.add('hidden');
  }
});

// Create empty profile on first login — do NOT auto-fill name from provider
async function ensureProfile(user) {
  const ref  = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      firstName: '', lastName: '',
      email:     user.email || '',
      photoURL:  '', phone: '', birthday: '', gender: '',
      createdAt: Date.now()
    });
  }
}

async function afterLogin(user) {
  logEvent(analytics, 'login', { method: user.providerData[0]?.providerId || 'unknown' });
  await ensureProfile(user);
  window.location.replace(redirectTo);
}

async function doSocialLogin(provider, btnId) {
  const btn = document.getElementById(btnId);
  if (btn.disabled) return;
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳ Нэвтэрч байна...';
  try {
    const result = await signInWithPopup(auth, provider);
    await ensureProfile(result.user).catch(e => console.warn('profile:', e));
    window.location.replace(redirectTo);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = orig;
    console.error('login error:', e.code, e.message);
    if (e.code === 'auth/popup-blocked') {
      showMsg('social-msg', 'Popup блоклогдлоо — браузерт popup зөвшөөрнө үү.');
    } else if (e.code !== 'auth/popup-closed-by-user') {
      showMsg('social-msg', `Алдаа: ${e.code || e.message}`);
    }
  }
}

// GOOGLE
document.getElementById('btnGoogle').addEventListener('click', () =>
  doSocialLogin(new GoogleAuthProvider(), 'btnGoogle')
);

// EMAIL LOGIN
document.getElementById('btnLogin').addEventListener('click', async () => {
  const btn = document.getElementById('btnLogin');
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  msg_clear('login-msg');
  if (!email || !pass) { showMsg('login-msg','И-мэйл болон нууц үгээ оруулна уу.'); return; }
  btn.disabled = true; btn.textContent = 'Нэвтэрч байна...';
  try {
    const res = await signInWithEmailAndPassword(auth, email, pass);
    await afterLogin(res.user);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Нэвтрэх →';
    showMsg('login-msg', e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential'
      ? 'И-мэйл эсвэл нууц үг буруу байна.' : 'Алдаа гарлаа: ' + (e.code || e.message));
  }
});
['login-email','login-pass'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btnLogin').click(); })
);

// ── REGISTER — 6-digit code ──────────────────────────────────────────
function genCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
function vcSave(d)  { sessionStorage.setItem('_vc', JSON.stringify({ ...d, exp: Date.now() + 10*60*1000 })); }
function vcLoad()   { try { return JSON.parse(sessionStorage.getItem('_vc')||'null'); } catch { return null; } }

async function sendCode(email, name, code) {
  await emailjs.send('service_zqqvdkw', 'template_10uyn18', {
    email, from_name: name, passcode: code
  });
}

// "Код авах" товч
document.getElementById('btnSendCode').addEventListener('click', async () => {
  const btn   = document.getElementById('btnSendCode');
  const email = document.getElementById('reg-email').value.trim();
  msg_clear('reg-msg');
  if (!email) { showMsg('reg-msg','И-мэйл оруулна уу.'); return; }
  btn.disabled = true; btn.textContent = 'Илгээж байна...';
  try {
    const name = document.getElementById('reg-name').value.trim() || 'Хэрэглэгч';
    const code = genCode();
    await sendCode(email, name, code);
    vcSave({ code, email, name });
    document.getElementById('codeField').style.display = 'block';
    document.getElementById('verify-code').focus();
    document.getElementById('codeHint').textContent = email + ' хаяг руу илгээгдлээ';
    btn.textContent = 'Дахин илгээх';
    setTimeout(() => { btn.disabled = false; }, 30000);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Код авах';
    showMsg('reg-msg', 'Код илгээхэд алдаа гарлаа. Дахин оролдоно уу.');
  }
});

// "Дахин илгээх" товч
document.getElementById('btnResend').addEventListener('click', async () => {
  document.getElementById('btnSendCode').click();
});

// "Бүртгүүлэх" товч — кодыг шалгаад акаунт үүсгэнэ
document.getElementById('btnReg').addEventListener('click', async () => {
  const btn     = document.getElementById('btnReg');
  const name    = document.getElementById('reg-name').value.trim();
  const email   = document.getElementById('reg-email').value.trim();
  const pass    = document.getElementById('reg-pass').value;
  const entered = document.getElementById('verify-code').value.trim();
  msg_clear('reg-msg');
  if (!name)           { showMsg('reg-msg','Нэрээ оруулна уу.'); return; }
  if (!email)          { showMsg('reg-msg','И-мэйл оруулна уу.'); return; }
  if (!entered)        { showMsg('reg-msg','Баталгаажуулах кодыг оруулна уу.'); return; }
  if (pass.length < 6) { showMsg('reg-msg','Нууц үг хамгийн багадаа 6 тэмдэгт байх ёстой.'); return; }
  const s = vcLoad();
  if (!s || s.email !== email) { showMsg('reg-msg','Эхлээд и-мэйл рүүгээ код авна уу.'); return; }
  if (Date.now() > s.exp)      { sessionStorage.removeItem('_vc'); showMsg('reg-msg','Кодын хугацаа дууссан. Дахин авна уу.'); return; }
  if (entered !== s.code)      { showMsg('reg-msg','Код буруу байна.'); return; }
  btn.disabled = true; btn.textContent = 'Бүртгүүлж байна...';
  try {
    const res = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db,'users',res.user.uid), {
      firstName:'', lastName:'', email,
      photoURL:'', phone:'', birthday:'', gender:'', createdAt: Date.now()
    });
    sessionStorage.removeItem('_vc');
    logEvent(analytics, 'sign_up', { method: 'email' });
    window.location.replace(redirectTo);
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Бүртгүүлэх →';
    showMsg('reg-msg', e.code === 'auth/email-already-in-use'
      ? 'Энэ и-мэйл аль хэдийн бүртгэлтэй байна.' : 'Алдаа: ' + (e.code||e.message));
  }
});
['reg-name','reg-email','reg-pass'].forEach(id =>
  document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btnReg').click(); })
);

// FORGOT PASSWORD
document.getElementById('btnForgotSend').addEventListener('click', async () => {
  const email = document.getElementById('forgot-email').value.trim();
  msg_clear('forgot-msg');
  if (!email) {
    showMsg('forgot-msg', 'И-мэйл хаягаа оруулна уу.');
    document.getElementById('forgot-email').focus();
    return;
  }
  const btn = document.getElementById('btnForgotSend');
  btn.disabled = true; btn.textContent = 'Илгээж байна...';
  try {
    await sendPasswordResetEmail(auth, email);
    const el = document.getElementById('forgot-msg');
    el.textContent = `${email} хаяг руу нууц үг сэргээх холбоос илгээгдлээ. И-мэйлээ шалгана уу.`;
    el.className = 'msg success';
    el.style.display = 'block';
    btn.textContent = 'Илгээсэн ✓';
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Холбоос илгээх →';
    showMsg('forgot-msg', e.code === 'auth/user-not-found'
      ? 'Энэ и-мэйл бүртгэлгүй байна.' : 'Алдаа гарлаа: ' + (e.code || e.message));
  }
});
document.getElementById('forgot-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnForgotSend').click();
});

function msg_clear(id) { const el = document.getElementById(id); if(el) el.style.display='none'; }

function showMsg(id, text) {
  const el = document.getElementById(id);
  if (!el) { alert(text); return; }
  el.textContent = text;
  el.className = 'msg error';
  el.style.display = 'block';
}
</script>
