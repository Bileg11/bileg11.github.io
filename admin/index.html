<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — LFS Shanghai</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;
  --text:#f5f5f7;--muted:#86868b;--border:rgba(255,255,255,.1);
  --blue:#0071e3;--blue-hover:#0077ed;
  --green:#30d158;--red:#ff453a;--orange:#ff9f0a;
  --radius:12px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px}
.login-logo{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.login-logo span{color:var(--blue)}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.field{margin-bottom:16px}
.field label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:6px;letter-spacing:.02em}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:.2s}
.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
.login-btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;margin-top:4px}
.login-btn:hover{background:var(--blue-hover)}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:12px;color:var(--red);margin-top:12px;display:none}

/* DASHBOARD */
.dashboard{display:none}
.topbar{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,15,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;
}
.topbar-logo{font-size:15px;font-weight:700;letter-spacing:-.02em}
.topbar-logo span{color:var(--blue)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-email{font-size:12px;color:var(--muted)}
.logout-btn{padding:6px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;transition:.2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.main{max-width:1100px;margin:0 auto;padding:32px 24px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.stat-label{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-.02em}
.stat-value.blue{color:var(--blue)}
.stat-value.green{color:var(--green)}
.stat-value.orange{color:var(--orange)}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filter-select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--blue)}
.search-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:220px}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--muted)}
.filter-count{font-size:12px;color:var(--muted);margin-left:auto}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{display:grid;grid-template-columns:180px 130px 1fr 140px 90px 80px;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.booking-row{display:grid;grid-template-columns:180px 130px 1fr 140px 90px 80px;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);align-items:center;transition:.15s;cursor:pointer}
.booking-row:last-child{border-bottom:none}
.booking-row:hover{background:var(--bg3)}
.row-name{font-size:13px;font-weight:600;color:var(--text)}
.row-phone{font-size:12px;color:var(--muted);font-family:monospace}
.row-service{font-size:12px;color:var(--text)}
.row-date{font-size:12px;color:var(--muted)}
.row-people{font-size:12px;color:var(--text);text-align:center}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-new{background:rgba(0,113,227,.2);color:#60a5fa}
.badge-done{background:rgba(48,209,88,.15);color:var(--green)}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
.loading-state{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:24px}
.detail-row{display:flex;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.detail-label{font-size:12px;color:var(--muted);width:130px;flex-shrink:0;padding-top:1px}
.detail-value{font-size:13px;color:var(--text);font-weight:500;word-break:break-word}
.modal-actions{display:flex;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.btn-mark-done{flex:1;padding:10px;background:rgba(48,209,88,.15);border:1px solid rgba(48,209,88,.3);border-radius:10px;color:var(--green);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-mark-done:hover{background:rgba(48,209,88,.25)}
.btn-close{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.btn-close:hover{border-color:var(--muted)}

@media(max-width:800px){
  .table-header,.booking-row{grid-template-columns:1fr 1fr;gap:8px}
  .table-header .h-service,.table-header .h-date,.table-header .h-people,.table-header .h-status,
  .booking-row .row-service,.booking-row .row-date,.booking-row .row-people,.booking-row .row-status{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">LFS <span>Shanghai</span></div>
    <div class="login-sub">Admin панел — нэвтрэх</div>
    <div class="field">
      <label>Имэйл</label>
      <input type="email" id="loginEmail" placeholder="admin@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Нууц үг</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Нэвтрэх →</button>
    <div class="login-error" id="loginError">Имэйл эсвэл нууц үг буруу байна.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">LFS <span>Shanghai</span> · Admin</div>
    <div class="topbar-right">
      <span class="topbar-email" id="adminEmail"></span>
      <button class="logout-btn" onclick="doLogout()">Гарах</button>
    </div>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Нийт захиалга</div>
        <div class="stat-value blue" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Энэ сар</div>
        <div class="stat-value green" id="statMonth">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Энэ 7 хоног</div>
        <div class="stat-value orange" id="statWeek">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Өнөөдөр</div>
        <div class="stat-value" id="statToday">—</div>
      </div>
    </div>

    <div class="filters">
      <input class="search-input" type="text" id="searchInput" placeholder="🔍 Нэр, утас хайх..." oninput="renderTable()">
      <select class="filter-select" id="filterService" onchange="renderTable()">
        <option value="">Бүх үйлчилгээ</option>
        <option>🌟 VIP эрүүл мэндийн үйлчилгээтэй аялал</option>
        <option>🩺 VIP Эрүүл мэндийн шинжилгээ</option>
        <option>🏙️ Аялалын хөтөч</option>
        <option>🛍️ Шоппинг дагалдах</option>
        <option>✈️ Нисэх онгоцны угтаа</option>
        <option>💼 Бизнесийн хэлмэрч</option>
      </select>
      <select class="filter-select" id="filterStatus" onchange="renderTable()">
        <option value="">Бүх статус</option>
        <option value="new">Шинэ</option>
        <option value="done">Дууссан</option>
      </select>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <span>Нэр</span>
        <span>Утас</span>
        <span class="h-service">Үйлчилгээ</span>
        <span class="h-date">Ирэх огноо</span>
        <span class="h-people">Хүн</span>
        <span class="h-status">Статус</span>
      </div>
      <div id="tableBody"><div class="loading-state">Ачаалж байна...</div></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-title">Захиалгын дэлгэрэнгүй</div>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button class="btn-mark-done" id="markDoneBtn" onclick="markDone()">✓ Дууссан гэж тэмдэглэх</button>
      <button class="btn-close" onclick="closeModal()">Хаах</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDixZdKwlrixRFokERCMQ5Ld1BMkhUttCQ",
  authDomain: "lfs-shanghai.firebaseapp.com",
  projectId: "lfs-shanghai",
  storageBucket: "lfs-shanghai.firebasestorage.app",
  messagingSenderId: "337508244675",
  appId: "1:337508244675:web:f47b7e14417a0f1d129676"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allBookings = [];
let currentDocId = null;

// AUTH STATE
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('adminEmail').textContent = user.email;
    loadBookings();
  } else {
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
  }
});

// LOGIN
window.doLogin = async function() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  btn.disabled = true; btn.textContent = 'Нэвтэрч байна...';
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Нэвтрэх →';
  }
};

// LOGOUT
window.doLogout = () => signOut(auth);

// LOAD
async function loadBookings() {
  const q = query(collection(db, 'bookings'), orderBy('createdAt', 'desc'));
  const snap = await getDocs(q);
  allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  updateStats();
  renderTable();
}

function updateStats() {
  const now = new Date();
  const month = now.getMonth(); const year = now.getFullYear();
  const weekAgo = new Date(now - 7*24*60*60*1000);
  const today = now.toDateString();

  document.getElementById('statTotal').textContent = allBookings.length;
  document.getElementById('statMonth').textContent = allBookings.filter(b => {
    const d = b.createdAt?.toDate?.(); return d && d.getMonth()===month && d.getFullYear()===year;
  }).length;
  document.getElementById('statWeek').textContent = allBookings.filter(b => {
    const d = b.createdAt?.toDate?.(); return d && d >= weekAgo;
  }).length;
  document.getElementById('statToday').textContent = allBookings.filter(b => {
    const d = b.createdAt?.toDate?.(); return d && d.toDateString()===today;
  }).length;
}

window.renderTable = function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const svc = document.getElementById('filterService').value;
  const status = document.getElementById('filterStatus').value;

  let filtered = allBookings.filter(b => {
    const matchSearch = !search || b.name?.toLowerCase().includes(search) || b.phone?.includes(search);
    const matchSvc = !svc || b.service === svc;
    const matchStatus = !status || (status==='done' ? b.done : !b.done);
    return matchSearch && matchSvc && matchStatus;
  });

  document.getElementById('filterCount').textContent = `${filtered.length} захиалга`;

  if (!filtered.length) {
    document.getElementById('tableBody').innerHTML = '<div class="empty-state">Захиалга олдсонгүй</div>';
    return;
  }

  document.getElementById('tableBody').innerHTML = filtered.map(b => `
    <div class="booking-row" onclick="openModal('${b.id}')">
      <div class="row-name">${b.name || '—'}</div>
      <div class="row-phone">${b.phone || '—'}</div>
      <div class="row-service">${b.service || '—'}</div>
      <div class="row-date">${b.arrival || b.start || '—'}</div>
      <div class="row-people">${b.people || '—'}</div>
      <div class="row-status">
        <span class="badge ${b.done ? 'badge-done' : 'badge-new'}">${b.done ? 'Дууссан' : 'Шинэ'}</span>
      </div>
    </div>
  `).join('');
};

window.openModal = function(id) {
  const b = allBookings.find(x => x.id === id);
  if (!b) return;
  currentDocId = id;
  const d = b.createdAt?.toDate?.();
  const dateStr = d ? d.toLocaleString('mn-MN') : '—';
  document.getElementById('modalContent').innerHTML = `
    <div class="detail-row"><span class="detail-label">Нэр</span><span class="detail-value">${b.name||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Утас / WeChat</span><span class="detail-value">${b.phone||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Үйлчилгээ</span><span class="detail-value">${b.service||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Хүний тоо</span><span class="detail-value">${b.people||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Бүлэг</span><span class="detail-value">${b.group||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Ирэх огноо</span><span class="detail-value">${b.arrival||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Явах огноо</span><span class="detail-value">${b.departure||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Аялал эхлэх</span><span class="detail-value">${b.start||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Хэдэн өдөр</span><span class="detail-value">${b.days||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Social</span><span class="detail-value">${b.social||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Нэмэлт хүсэлт</span><span class="detail-value">${b.note||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Огноо</span><span class="detail-value">${dateStr}</span></div>
    <div class="detail-row"><span class="detail-label">Статус</span><span class="detail-value"><span class="badge ${b.done?'badge-done':'badge-new'}">${b.done?'Дууссан':'Шинэ'}</span></span></div>
  `;
  const btn = document.getElementById('markDoneBtn');
  btn.style.display = b.done ? 'none' : 'block';
  document.getElementById('modalBg').classList.add('open');
};

window.closeModal = function(e) {
  if (!e || e.target === document.getElementById('modalBg')) {
    document.getElementById('modalBg').classList.remove('open');
    currentDocId = null;
  }
};

window.markDone = async function() {
  if (!currentDocId) return;
  await updateDoc(doc(db, 'bookings', currentDocId), { done: true });
  const b = allBookings.find(x => x.id === currentDocId);
  if (b) b.done = true;
  updateStats();
  renderTable();
  document.getElementById('modalBg').classList.remove('open');
};

// Enter key login
document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
